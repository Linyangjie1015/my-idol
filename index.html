<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>My Idol - 升级维护中</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'WQYMicroHei','PingFang SC',sans-serif;background:linear-gradient(180deg,#FFF5F7,#FFE4EC);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.icon{width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,#FF8FA3,#FF6B8A);display:flex;align-items:center;justify-content:center;margin-bottom:24px;font-size:36px;color:white;font-weight:700}
h1{font-size:22px;color:#333;font-weight:700;margin-bottom:8px}
.subtitle{font-size:15px;color:#8E8E93;margin-bottom:32px;line-height:1.6}
.card{background:white;border-radius:16px;padding:24px;width:100%;max-width:360px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:16px}
.card h2{font-size:16px;color:#333;margin-bottom:12px;font-weight:600}
.card p{font-size:14px;color:#666;line-height:1.8}
.highlight{color:#FF6B8A;font-weight:600}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;background:#FFF0F3;color:#FF6B8A;font-size:12px;font-weight:600;margin:4px}
.footer{margin-top:24px;font-size:12px;color:#C7C7CC}
</style>
</head>
<body>
<div class="icon">M</div>
<h1>My Idol V1.6 升级维护中</h1>
<p class="subtitle">我们正在进行版本升级，全新内容即将到来</p>
<div class="card">
<h2>即将上线</h2>
<p>
<span class="badge">9大新系统</span>
<span class="badge">6个新APP</span>
<span class="badge">抽卡系统</span>
<span class="badge">150位爱豆</span>
<span class="badge">付费会员</span>
<span class="badge">MV拍摄</span>
</p>
<p style="margin-top:12px">预计上线时间：<span class="highlight">2026年6月17日 12:00</span></p>
</div>
<div class="card">
<p>如有问题请联系官方微博或抖音群</p>
<p style="margin-top:8px">感谢你的耐心等待</p>
</div>
<div class="footer">My Idol Team / V1.5 已停服 / V1.6 即将上线</div>
</body>
</html>
