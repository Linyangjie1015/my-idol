<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>My Idol</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="My Idol">
    <meta name="theme-color" content="#FF8FA3">
    <style>
    /* ==================== CSS VARIABLES ==================== */
    :root {
        --bg-main: #FFF5F7;
        --bg-card: #FFFFFF;
        --color-primary: #FF8FA3;
        --color-secondary: #FFCCD8;
        --color-accent: #FFB3C1;
        --color-text: #2D2D2D;
        --color-text-light: #8E8E93;
        --color-border: #F0F0F0;
        --color-danger: #FF6B8A;
        --color-success: #4CD964;
        --shadow: 0 2px 12px rgba(255,143,163,0.15);
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-pill: 50px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    @media (min-width: 768px) {
        body { padding: 40px; }
        .phone-frame { width: 420px; height: 900px; }
    }
    @media (hover: hover) and (pointer: fine) {
        .btn:hover { opacity: 0.9; }
        .card:hover { box-shadow: 0 4px 16px rgba(255,143,163,0.25); }
    }
    
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #FFF5F7 0%, #FFE4EC 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        -webkit-overflow-scrolling: touch;
    }

    .phone-frame {
        width: 375px;
        height: 812px;
        background: var(--bg-main);
        border-radius: 45px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 25px 80px rgba(255,143,163,0.3);
        border: 2px solid rgba(255,255,255,0.9);
        display: flex;
        flex-direction: column;
    }

    .status-bar {
        background: var(--bg-card);
        padding: 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--color-border);
    }

    .status-time { font-weight: 600; font-size: 14px; color: var(--color-text); }
    .status-icons { display: flex; gap: 6px; font-size: 12px; color: var(--color-text); }

    .page { display: none; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; min-height: 0; }
    .page.active { display: flex; flex-direction: column; }

    .page-content { padding: 20px; flex: 1; min-height: 0; overflow-y: auto; }

    .page-header {
        background: var(--bg-card);
        padding: 16px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--color-border);
        position: sticky;
        top: 0;
        z-index: 10;
    }

    .back-btn, .home-btn {
        width: auto;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--color-primary);
        font-size: 14px;
        padding: 0 8px;
        white-space: nowrap;
    }

    .page-title { font-size: 16px; font-weight: 600; color: var(--color-text); }

    /* ==================== BUTTONS ==================== */
    .btn {
        padding: 12px 24px;
        border-radius: var(--radius-pill);
        border: none;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-primary {
        background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
        color: white;
        box-shadow: var(--shadow);
    }

    .btn-primary:active { opacity: 0.9; transform: scale(0.98); }

    .btn-secondary {
        background: var(--bg-card);
        color: var(--color-text);
        border: 1px solid var(--color-border);
    }

    .btn-secondary:active { background: var(--color-border); }

    .btn-outline {
        background: transparent;
        color: var(--color-primary);
        border: 1px solid var(--color-primary);
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-lg { width: 100%; padding: 16px; font-size: 16px; }
    .btn-sm { padding: 8px 16px; font-size: 12px; }

    /* ==================== CARDS ==================== */
    .card {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        padding: 16px;
        margin-bottom: 12px;
        box-shadow: var(--shadow);
        border: 1px solid var(--color-border);
    }

    .card.selected {
        border: 2px solid var(--color-primary);
        background: linear-gradient(135deg, rgba(255,143,163,0.05), rgba(255,179,193,0.1));
    }

    /* ==================== INPUTS ==================== */
    input, select {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        font-size: 15px;
        background: var(--bg-card);
        color: var(--color-text);
        outline: none;
        margin-bottom: 12px;
    }

    input:focus, select:focus { border-color: var(--color-primary); }

    .tag {
        display: inline-block;
        padding: 8px 16px;
        border-radius: var(--radius-pill);
        font-size: 13px;
        margin: 4px;
        cursor: pointer;
        border: 1px solid var(--color-border);
        background: var(--bg-card);
        color: var(--color-text);
        transition: all 0.2s;
    }

    .tag.selected {
        background: var(--color-primary);
        color: white;
        border-color: var(--color-primary);
    }

    .tag:active { transform: scale(0.95); }

    /* ==================== WELCOME PAGE ==================== */
    .welcome-container {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px 24px;
        background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-main) 100%);
    }

    .welcome-logo {
        font-size: 48px;
        font-weight: 800;
        background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
    }

    .welcome-subtitle {
        color: var(--color-text-light);
        font-size: 14px;
        margin-bottom: 48px;
    }

    .save-slot {
        width: 100%;
        max-width: 280px;
        padding: 16px;
        border-radius: var(--radius-lg);
        margin-bottom: 10px;
        cursor: pointer;
        text-align: center;
        transition: all 0.2s;
    }

    .save-slot.empty {
        background: var(--bg-card);
        border: 1px dashed var(--color-accent);
        color: var(--color-text-light);
    }

    .save-slot.occupied {
        background: var(--bg-card);
        border: 1px solid var(--color-border);
    }

    .save-slot:hover { transform: translateY(-2px); box-shadow: var(--shadow); }

    /* ==================== PROGRESS BAR ==================== */
    .progress-bar {
        height: 6px;
        background: var(--color-border);
        border-radius: 3px;
        overflow: hidden;
        margin: 16px 0;
    }

    .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
        transition: width 0.3s;
    }

    /* ==================== BOTTOM NAV ==================== */
    .bottom-nav {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--bg-card);
        display: flex;
        justify-content: space-around;
        padding: 8px 0 20px;
        border-top: 1px solid var(--color-border);
    }

    .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 10px;
        color: var(--color-text-light);
        cursor: pointer;
        padding: 4px 12px;
        transition: all 0.2s;
    }

    .nav-item.active { color: var(--color-primary); }
    .nav-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 4px;
        background: transparent;
        transition: all 0.2s;
    }
    .nav-item.active .nav-icon {
        background: linear-gradient(135deg, #FFF5F7, #FFCCD8);
    }
    .nav-item.active .nav-icon svg {
        stroke: var(--color-primary);
    }

    /* ==================== STAT BAR ==================== */
    .stat-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
    }

    .stat-label { font-size: 12px; color: var(--color-text-light); width: 50px; }
    .stat-value { font-size: 12px; font-weight: 600; color: var(--color-text); width: 30px; text-align: right; }

    .stat-track {
        flex: 1;
        height: 6px;
        background: var(--color-border);
        border-radius: 3px;
        overflow: hidden;
    }

    .stat-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.3s;
    }

    .stat-fill.体力 { background: linear-gradient(90deg, var(--color-primary), var(--color-accent)); }
    .stat-fill.life { background: linear-gradient(90deg, var(--color-danger), #FF8FA3); }
    .stat-fill.credit { background: linear-gradient(90deg, #FFD700, #FFE566); }
    .stat-fill.danger { background: linear-gradient(90deg, #FF4757, var(--color-danger)); }

    /* ==================== MODAL ==================== */
    .modal-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.5);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 100;
    }

    .modal-overlay.active { display: flex; }

    .modal-box {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        padding: 24px;
        width: 90%;
        max-width: 320px;
        text-align: center;
    }

    .modal-title { font-size: 18px; font-weight: 600; color: var(--color-text); margin-bottom: 12px; }
    .modal-message { font-size: 14px; color: var(--color-text-light); line-height: 1.6; margin-bottom: 20px; }

    /* ==================== REST BUTTONS ==================== */
    .rest-buttons {
        display: flex;
        gap: 8px;
        padding: 12px 16px;
        background: var(--bg-card);
        border-top: 1px solid var(--color-border);
    }

    /* ==================== LIST ==================== */
    .list-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 0;
        border-bottom: 1px solid var(--color-border);
        cursor: pointer;
    }

    .list-item:last-child { border-bottom: none; }

    /* ==================== AVATAR ==================== */
    .avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 600;
        font-size: 18px;
    }

    .avatar-sm { width: 36px; height: 36px; font-size: 14px; }

    /* ==================== BADGE ==================== */
    .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: var(--radius-pill);
        font-size: 11px;
        font-weight: 600;
    }

    .badge-primary { background: var(--color-primary); color: white; }
    .badge-secondary { background: var(--color-secondary); color: var(--color-text); }

    /* ==================== SECTION ==================== */
    .section-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--color-text-light);
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .section-divider {
        height: 8px;
        background: var(--bg-main);
        margin: 16px -20px;
    }

    /* ==================== COMPANY CARD ==================== */
    .company-card {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        padding: 16px;
        margin-bottom: 12px;
        border: 2px solid transparent;
        cursor: pointer;
        transition: all 0.2s;
    }

    .company-card.selected {
        border-color: var(--color-primary);
        background: linear-gradient(135deg, rgba(255,143,163,0.05), rgba(255,179,193,0.1));
    }

    .company-name { font-size: 16px; font-weight: 600; color: var(--color-text); margin-bottom: 6px; }
    .company-desc { font-size: 13px; color: var(--color-text-light); line-height: 1.5; margin-bottom: 10px; }
    .company-tags { display: flex; flex-wrap: wrap; gap: 6px; }

    /* ==================== GROUP CARD ==================== */
    .group-card {
        background: var(--bg-card);
        border-radius: var(--radius-md);
        padding: 14px;
        margin-bottom: 10px;
        border: 2px solid transparent;
        cursor: pointer;
        transition: all 0.2s;
    }

    .group-card.selected { border-color: var(--color-primary); }
    .group-name { font-size: 15px; font-weight: 600; color: var(--color-text); }
    .group-desc { font-size: 12px; color: var(--color-text-light); margin-top: 4px; }

    /* ==================== HOME INDICATOR ==================== */
    .home-indicator {
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 134px;
        height: 5px;
        background: var(--color-text);
        border-radius: 3px;
        opacity: 0.2;
    }

    /* ==================== APP GRID ==================== */
    .app-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px 8px;
        padding: 8px 0;
    }
    .app-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        transition: transform 0.15s;
    }
    .app-item:active { transform: scale(0.92); }
    .app-icon-wrap {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #FFF5F7, #FFCCD8);
        margin-bottom: 6px;
        position: relative;
        box-shadow: 0 2px 8px rgba(255,143,163,0.18);
    }
    .app-icon-wrap svg {
        width: 26px;
        height: 26px;
        stroke: #FF8FA3;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
    }
    .app-icon-wrap.locked {
        background: linear-gradient(135deg, #F0F0F0, #E0E0E0);
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .app-icon-wrap.locked svg { stroke: #BBB; }
    .app-lock {
        position: absolute;
        bottom: -2px;
        right: -2px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--color-text-light);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .app-lock svg { width: 10px; height: 10px; stroke: white; stroke-width: 2.5; }
    .app-name {
        font-size: 11px;
        color: var(--color-text);
        text-align: center;
        line-height: 1.2;
        max-width: 60px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .app-item.locked .app-name { color: var(--color-text-light); }

    /* ==================== MY PAGE ==================== */
    .my-header {
        display: flex;
        align-items: center;
        padding: 20px;
        background: linear-gradient(135deg, #FFF5F7, #FFE4EC);
    }
    .my-stat-bar {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
    }
    .my-stat-label { font-size: 12px; color: var(--color-text-light); width: 36px; }
    .my-stat-track { flex: 1; height: 5px; background: var(--color-border); border-radius: 3px; overflow: hidden; }
    .my-stat-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .my-stat-fill.dance { background: linear-gradient(90deg, #FF8FA3, #FFB3C1); }
    .my-stat-fill.vocal { background: linear-gradient(90deg, #7EC8E3, #B8E6F0); }
    .my-stat-fill.rap { background: linear-gradient(90deg, #FFD700, #FFE566); }
    .my-stat-fill.acting { background: linear-gradient(90deg, #C9A0FF, #DFC4FF); }
    .my-stat-fill.variety { background: linear-gradient(90deg, #4CD964, #7BE898); }
    .my-stat-val { font-size: 12px; font-weight: 600; width: 28px; text-align: right; }

    /* ==================== SCHEDULE ==================== */
    .schedule-item {
        display: flex;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid var(--color-border);
    }
    .schedule-item:last-child { border-bottom: none; }
    .schedule-time { font-size: 12px; font-weight: 600; color: var(--color-primary); width: 50px; }
    .schedule-info { flex: 1; }
    .schedule-name { font-size: 14px; font-weight: 600; color: var(--color-text); }
    .schedule-tag {
        display: inline-block;
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 50px;
        margin-right: 4px;
    }
    .schedule-tag.notice { background: #FFE4EC; color: #FF8FA3; }
    .schedule-tag.practice { background: #E4F5FF; color: #5BB8E8; }
    .schedule-tag.show { background: #FFF4E0; color: #F0A030; }
    .schedule-tag.interview { background: #F0E4FF; color: #A070E0; }
    .schedule-status {
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 50px;
        cursor: pointer;
        border: 1px solid var(--color-border);
        background: var(--bg-card);
        color: var(--color-text-light);
    }
    .schedule-status.done { background: var(--color-primary); color: white; border-color: var(--color-primary); }
    .schedule-status.skip { background: var(--color-border); color: var(--color-text-light); }

    /* ==================== MEETING ==================== */
    .meeting-item {
        padding: 12px 0;
        border-bottom: 1px solid var(--color-border);
        cursor: pointer;
    }
    .meeting-item:last-child { border-bottom: none; }
    .meeting-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--color-primary);
        margin-right: 10px;
        flex-shrink: 0;
    }
    .meeting-dot.read { background: var(--color-border); }

    /* ==================== INS TRANSLATE ==================== */
    .translate-btn {
        display: inline-block;
        font-size: 11px;
        color: var(--color-primary);
        cursor: pointer;
        margin-left: 8px;
        padding: 2px 6px;
        border: 1px solid var(--color-primary);
        border-radius: 4px;
    }
    .translate-btn:hover { background: rgba(255,143,163,0.08); }

    /* ==================== INVENTORY ==================== */
    .inventory-item {
        display: flex;
        align-items: center;
        padding: 8px 12px;
        background: var(--bg-main);
        border-radius: 8px;
        margin-bottom: 6px;
    }
    .inventory-item .item-name { flex: 1; font-size: 13px; }
    .inventory-item .item-use {
        font-size: 11px;
        padding: 4px 12px;
        border-radius: 50px;
        background: var(--color-primary);
        color: white;
        cursor: pointer;
        border: none;
    }

    /* ==================== BUBBLE ANIMATION ==================== */
    @keyframes bubbleFadeIn {
        0% { opacity: 0; transform: translateY(10px); }
        60% { opacity: 1; transform: translateY(-3px); }
        80% { transform: translateY(1px); }
        100% { transform: translateY(0); }
    }
    @keyframes bubbleBounce {
        0% { transform: scale(0.95); }
        50% { transform: scale(1.03); }
        100% { transform: scale(1); }
    }
    .bubble-msg-anim {
        animation: bubbleFadeIn 0.4s ease-out, bubbleBounce 0.3s ease-out 0.1s;
    }
    @keyframes liveMsgSlide {
        0% { opacity: 0; transform: translateX(-8px); }
        100% { opacity: 1; transform: translateX(0); }
    }
    .live-msg-anim {
        animation: liveMsgSlide 0.3s ease-out;
    }
    /* ==================== INS/TIKTOK TOP TAB ==================== */
    .ins-top-tab {
        display: flex;
        border-bottom: 1px solid var(--color-border);
        background: var(--bg-card);
        flex-shrink: 0;
    }
    .ins-top-tab-item {
        flex: 1;
        text-align: center;
        padding: 10px 0;
        cursor: pointer;
        font-size: 13px;
        color: var(--color-text-light);
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
    }
    .ins-top-tab-item.active {
        color: var(--color-primary);
        font-weight: 600;
        border-bottom-color: var(--color-primary);
    }
    </style>
</head>
<body>

<div class="phone-frame">
    <!-- Status Bar -->
    <div class="status-bar" id="statusBar" style="display: none;">
        <span class="status-time" id="statusTime">09:41</span>
        <div class="status-icons">
            <span>5G</span>
            <span>100%</span>
        </div>
    </div>

    <!-- Main App Container - ONLY page content goes here -->
    <div id="app" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;"></div>

    <!-- Rest Buttons - outside #app so render() won't destroy them -->
    <div class="rest-buttons" id="restButtons" style="display: none;">
        <button class="btn btn-sm btn-secondary" onclick="rest30sec()" style="flex:1;">休息30秒</button>
        <button class="btn btn-sm btn-primary" onclick="rest50percent()" style="flex:1;">恢复50%</button>
    </div>

    <!-- Bottom Navigation - outside #app -->
    <div class="bottom-nav" id="bottomNav" style="display: none;"></div>

    <!-- Modal - outside #app -->
    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <div class="modal-title" id="modalTitle">Title</div>
            <div class="modal-message" id="modalMessage">Message</div>
            <div id="modalButtons"></div>
        </div>
    </div>

    <!-- Home Indicator - outside #app -->
    <div class="home-indicator" id="homeIndicator" style="display: none;"></div>
</div>

<script>
// ==================== GAME DATA ====================
const COMPANIES = {
    "SM Entertainment": {
        name: "SM Entertainment",
        desc: "韩国最大型经纪公司，以精致标准化著称。旗下艺人以出众的颜值、完美的舞台展现和强大的综合实力闻名。",

function genBirthOptions(start, count, part) {
    var bd = gameState.player.birthDate || '';
    var parts = bd.split('-');
    var sel = parts[part] || '';
    var html = '';
    for (var i = 0; i < count; i++) {
        var val = part === 0 ? start - i : start + i;
        html += '<option value="' + val + '"' + (String(val) === sel ? ' selected' : '') + '>' + val + '</option>';
    }
    return html;
}

function calculateAge() {
    var yearEl = document.getElementById('inputBirth年');
    var monthEl = document.getElementById('inputBirth月');
    var dayEl = document.getElementById('inputBirth日');
    const year = yearEl ? yearEl.value : '';
    const month = monthEl ? monthEl.value : '';
    const day = dayEl ? dayEl.value : '';
    
    if (year && month && day) {
        const birthDate = new Date(year, month - 1, day);
        const today = new Date();
        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
            age--;
        }
        gameState.player.age = age;
        gameState.player.birthDate = `${year}-${month}-${day}`;
        
        const ageEl = document.getElementById('ageValue');
        if (ageEl) ageEl.textContent = age;
    }
}

function nextCreationStep(step) {
    // 验证步骤1必填项
    if (creationStep === 1) {
        if (!gameState.player.name || !gameState.player.gender || gameState.player.personality.length !== 3) {
            showModal('提示', '请填写：艺名、性别、选择3个性格标签');
            return;
        }
    }
    // 验证步骤2必填项
    if (creationStep === 2) {
        if (!gameState.player.company) {
            showModal('提示', '请选择公司');
            return;
        }
    }
    // 验证步骤3必填项
    if (creationStep === 3) {
        if (!gameState.player.role) {
            showModal('提示', '请选择身份：练习生或出道艺人');
            return;
        }
    }
    // 验证步骤4必填项
    if (creationStep === 4) {
        if (gameState.player.groups.length !== 3) {
            showModal('提示', '请选择3个志愿团体');
            return;
        }
    }
    // 验证步骤5必填项
    if (creationStep === 5) {
        if (gameState.player.positions.length !== 3) {
            showModal('提示', '请选择3个定位');
            return;
        }
    }
    creationStep = step;
    render();
}

function prevCreationStep() {
    creationStep--;
    render();
}

function goToWelcome() {
    currentPage = 'welcome';
    render();
}

function completeCreation() {
    try {
        // 初始化游戏
        if (gameState.player.role === 'Trainee') {
            initAsTrainee();
        } else {
            initAsIdol();
        }
        
        // 切换到首页
        currentPage = 'home';
        render();
        
        // 渲染完成后再显示UI元素
        document.getElementById('statusBar').style.display = 'flex';
        document.getElementById('restButtons').style.display = 'flex';
        document.getElementById('bottomNav').style.display = 'flex';
        document.getElementById('homeIndicator').style.display = 'block';
        
        renderBottomNav();
        initScheduleItems();
        initMeetings();
    } catch(e) {
        alert('初始化出错: ' + e.message);
        console.error('completeCreation error:', e);
    }
}

    currentPage = 'work';
    render();
    renderBottomNav();
}

    gameState.money = 70000;
    
    const company = gameState.player.company;
    if (company === 'SM Entertainment' || company === 'YG Entertainment' || company === 'HYBE') {
        gameState.fans = 500 + Math.floor(Math.random() * 201);
    } else if (company === 'JYP Entertainment') {
        gameState.fans = 300 + Math.floor(Math.random() * 201);
    } else {
        gameState.fans = 100 + Math.floor(Math.random() * 101);
    }
    
    gameState.player.avatar = gameState.player.name.charAt(0).toUpperCase();
    
    const companyData = COMPANIES[company];
    gameState.emails.unshift({

function do训练项目(stat, 体力cost, moneyCost, name) {
    if (gameState.体力 < 体力cost) {
        showModal('体力不足', '请先休息恢复体力');
        return;
    }
    if (gameState.money < moneyCost) {
        showModal('金币不足', '金币不够支付训练费用');
        return;
    }
    
    gameState.体力 -= 体力cost;
    gameState.money -= moneyCost;
    
    if (stat === 'random') {
        var keys = Object.keys(gameState.stats);
        stat = keys[Math.floor(Math.random() * keys.length)];
        var names = { dance: '舞蹈', vocal: '声乐', rap: '说唱', acting: '表演', variety: '综艺' };
        name = names[stat] + '训练';
    }
    
    var gain = Math.floor(Math.random() * 16) + 5;
    gameState.stats[stat] = Math.min(100, gameState.stats[stat] + gain);
    gameState.influence = Math.min(200, (gameState.influence || 50) + Math.floor(Math.random() * 3) + 1);
    
    var names = { dance: '舞蹈', vocal: '声乐', rap: '说唱', acting: '表演', variety: '综艺' };
    showModal('训练完成', '-' + 体力cost + ' 体力\n-' + moneyCost.toLocaleString() + ' 金币\n+' + gain + ' ' + names[stat]);
    render();
}

function useItem(index) {
    const item = gameState.inventory[index];
    if (!item) return;
    
    if (item.effect === '体力') {
        gameState.体力 = Math.min(gameState.max体力, gameState.体力 + item.value);
        showModal('使用成功', `使用了 ${item.name}\n+${item.value} 体力`);
    } else if (item.effect === '生命') {
        gameState.life = Math.min(100, gameState.life + item.value);
        showModal('使用成功', `使用了 ${item.name}\n+${item.value} 生命`);
    } else {
        showModal('使用成功', `使用了 ${item.name}`);
    }
    
    gameState.inventory.splice(index, 1);
    render();
}

function render行程表Page(container) {
    if (!gameState.scheduleItems || gameState.scheduleItems.length === 0) {
        initScheduleItems();
    }
    
    var itemsHtml = '';
    var items = gameState.scheduleItems;
    for (var i = 0; i < items.length; i++) {
        var item = items[i];
        if (item.status === 'done' && item._completed) continue;
        var statusHtml = '';
        if (item.status === 'done') {
            statusHtml = '<span style="font-size:18px;color:var(--color-danger);font-weight:700;">✓</span>';
        } else if (item.status === 'skip') {
            statusHtml = '<span style="font-size:18px;color:#FF4757;font-weight:700;">✗</span>';
        } else {
            statusHtml = '<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#CCC;"></span>';
        }
        var actionsHtml = '';
        if (item.status === 'todo') {
            actionsHtml = '<div style="display:flex;gap:6px;align-items:center;">'
                + '<button class="btn btn-sm btn-primary" onclick="joinSchedule(' + i + ')" style="font-size:11px;padding:4px 10px;">参加</button>'
                + '<button class="btn btn-sm btn-secondary" onclick="skipSchedule(' + i + ')" style="font-size:11px;padding:4px 10px;color:var(--color-danger);border-color:var(--color-danger);">不参加</button>'

            actionsHtml = statusHtml;

function joinSchedule(index) {
    var item = gameState.scheduleItems[index];
    if (!item || item.status !== 'todo') return;
    var 体力cost = 15 + Math.floor(Math.random() * 15);
    if (gameState.体力 < 体力cost) {
        showModal('体力不足', '参加此活动需要 ' + 体力cost + ' 体力');
        return;
    }
    gameState.体力 -= 体力cost;
    item.status = 'done';
    var gainMsg = '';
    if (item.tagType === 'practice') {
        var keys = Object.keys(gameState.stats);
        var rk = keys[Math.floor(Math.random() * keys.length)];
        var gain = Math.floor(Math.random() * 3) + 2;
        gameState.stats[rk] = Math.min(100, gameState.stats[rk] + gain);
        var names = { dance: '舞蹈', vocal: '声乐', rap: '说唱', acting: '表演', variety: '综艺' };
        gainMsg = '\n+' + gain + ' ' + names[rk];
    } else if (item.tagType === 'notice' || item.tagType === 'show') {
        var moneyGain = Math.floor(Math.random() * 10000) + 5000;
        var fansGain = Math.floor(Math.random() * 50) + 10;
        gameState.money += moneyGain;
        gameState.fans += fansGain;
        gainMsg = '\n+' + moneyGain.toLocaleString() + ' 金币\n+' + fansGain + ' 粉丝';
    } else if (item.tagType === 'interview') {
        var fameGain = Math.floor(Math.random() * 5) + 2;
        var influenceGain = Math.floor(Math.random() * 3) + 1;
        gameState.fame = Math.min(200, (gameState.fame || 30) + fameGain);
        gameState.influence = Math.min(200, (gameState.influence || 50) + influenceGain);
        gainMsg = '\n+' + fameGain + ' 名气\n+' + influenceGain + ' 影响力';
    }
    item._completed = true;
    showModal('参加完成', item.name + '\n-' + 体力cost + ' 体力' + gainMsg);
    render();
}

function getSameCompanyNPCs() {
    var npcs = [];
    var company = COMPANIES[gameState.player.company];
    if (!company) return npcs;
    var keys = Object.keys(company.groups);
    for (var k = 0; k < keys.length; k++) {
        var group = company.groups[keys[k]];
        for (var m = 0; m < group.members.length; m++) {
            if (group.members[m].name !== gameState.player.name) {
                npcs.push(group.members[m]);
            }
        }
    }
    return npcs;
}

    gameState.npc好感度[gameState.dating] = Math.min(100, gameState.npc好感度[gameState.dating] + Math.floor(Math.random() * 5) + 2);
    showModal('聊天', '和 ' + gameState.dating + ' 聊了一会儿\n好感度 +3');
    render();
}

function loveDate() {
    if (!gameState.dating) return;
    if (gameState.体力 < 20) { showModal('体力不足', '约会需要20体力'); return; }
    if (gameState.money < 10000) { showModal('金币不足', '约会需要10,000金币'); return; }
    gameState.体力 -= 20;
    gameState.money -= 10000;
    if (!gameState.npc好感度) gameState.npc好感度 = {};
    if (!gameState.npc好感度[gameState.dating]) gameState.npc好感度[gameState.dating] = 0;
    gameState.npc好感度[gameState.dating] = Math.min(100, gameState.npc好感度[gameState.dating] + Math.floor(Math.random() * 10) + 5);
    showModal('约会愉快', '和 ' + gameState.dating + ' 度过了美好时光\n-20 体力 -10,000 金币\n好感度 +8');
    render();
}

function showInterest(name) {
    if (!gameState.npc好感度) gameState.npc好感度 = {};
    if (!gameState.npc好感度[name]) gameState.npc好感度[name] = 0;
    if (gameState.npc好感度[name] >= 60) {
        gameState.dating = name;
        showModal('在一起了', '你和 ' + name + ' 正式在一起了！');
    } else {
        showModal('好感度不足', name + ' 的好感度为 ' + gameState.npc好感度[name] + '，需要60才能在一起');
    }
    render();
}

function getAvailableNPCs() {
    const npcs = [];
    Object.values(COMPANIES).forEach(company => {
        Object.values(company.groups).forEach(group => {
            group.members.forEach(member => {
                if (member.name !== gameState.player.name) {
                    npcs.push(member.name);
                }
            });
        });
    });
    return [...new Set(npcs)];
}

function breakup() {
    if (gameState.dating && gameState.npc好感度) {
        gameState.npc好感度[gameState.dating] = Math.max(0, (gameState.npc好感度[gameState.dating] || 0) - 20);
    }
    gameState.dating = null;
    showModal('分手', '你们已经分手了。好感度 -20');
    render();
}

function sendTiktokChat() {
    var input = document.getElementById('tiktokChatInput');
    if (!input || !input.value.trim() || !tiktokMsgChatUser) return;
    var msg = input.value.trim();
    input.value = '';
    if (!gameState.tiktokMessages) gameState.tiktokMessages = [];
    gameState.tiktokMessages.push({ with: tiktokMsgChatUser, fromMe: true, text: msg });
    render();
    setTimeout(function() {
        var replies = ['太棒了！', '哈哈', '下次一起拍！', '加油~', '好好看', '舞蹈好厉害'];
        gameState.tiktokMessages.push({ with: tiktokMsgChatUser, fromMe: false, text: replies[Math.floor(Math.random() * replies.length)] });
        render();
    }, 1000 + Math.random() * 2000);
}

function simulateVideoPlay(el, index) {
    var colors = ['#FF8FA3','#7EC8E3','#FFD700','#C9A0FF','#4CD964','#FF6B8A'];
    var step = 0;
    var interval = setInterval(function() {
        step++;
        if (step >= 5) { clearInterval(interval); el.style.background = ''; return; }
        var c = colors[(index + step) % colors.length];
        el.style.background = 'linear-gradient(135deg, ' + c + '22, ' + c + '44)';
    }, 400);
    _addTimer(interval);
}

function applyLoan(amount, interest) {
    const maxLoan = Math.floor(gameState.credit * 1000);
    const totalOwed = gameState.loanAmount + Math.floor(gameState.loanAmount * gameState.loanInterest / 100);
    if (totalOwed + amount > maxLoan) {
        showModal('额度不足', '已超出可贷额度，请先还款提升信誉');
        return;
    }
    gameState.loanAmount += amount;
    gameState.loanInterest = Math.max(gameState.loanInterest, interest);
    gameState.money += amount;
    showModal('贷款通过', '已到账 ' + amount.toLocaleString() + ' 金币\n利率: ' + interest + '%\n请按时还款，逾期将降低信誉');
    render();
}

function repayLoan() {
    const totalOwed = gameState.loanAmount + Math.floor(gameState.loanAmount * gameState.loanInterest / 100);
    if (gameState.money < totalOwed) {
        showModal('金币不足', '金币不够还款，当前余额: ' + gameState.money.toLocaleString());
        return;
    }
    gameState.money -= totalOwed;
    gameState.credit = Math.min(200, gameState.credit + 10);
    gameState.loanAmount = 0;
    gameState.loanInterest = 0;
    showModal('还款成功', '已还清贷款\n+10 信誉\n当前余额: ' + gameState.money.toLocaleString());
    render();
}

];

function initCrisisEvents() {
    crisisEvents = [];
    var count = 3 + Math.floor(Math.random() * 3);
    var shuffled = crisisEventPool.slice().sort(function() { return Math.random() - 0.5; });
    for (var i = 0; i < Math.min(count, shuffled.length); i++) {
        crisisEvents.push({ title: shuffled[i].title, desc: shuffled[i].desc, detail: shuffled[i].detail, handled: false });
    }
}

function addNewCrisisEvent() {
    if (crisisEvents.filter(function(e) { return !e.handled; }).length >= 5) return;
    var available = crisisEventPool.filter(function(p) {
        for (var i = 0; i < crisisEvents.length; i++) {
            if (crisisEvents[i].title === p.title && !crisisEvents[i].handled) return false;
        }
        return true;
    });
    if (available.length === 0) return;
    var pick = available[Math.floor(Math.random() * available.length)];
    crisisEvents.push({ title: pick.title, desc: pick.desc, detail: pick.detail, handled: false });
}

function renderCrisisPage(container) {
    if (crisisEvents.length === 0) initCrisisEvents();
    var activeEvents = crisisEvents.filter(function(e) { return !e.handled; });
    
    var eventsHtml = '';
    for (var i = 0; i < crisisEvents.length; i++) {
        var e = crisisEvents[i];
        if (e.handled) continue;
        eventsHtml += '<div class="card">'
            + '<div style="font-weight:600;margin-bottom:4px;">' + e.title + '</div>'
            + '<div style="font-size:13px;color:var(--color-text-light);margin-bottom:4px;">' + e.desc + '</div>'
            + '<div style="font-size:11px;color:var(--color-text-light);margin-bottom:8px;line-height:1.4;">' + e.detail + '</div>'
            + '<div style="display:flex;gap:6px;">'
            + '<button class="btn btn-sm btn-primary" onclick="handleCrisis(' + i + ',0)">妥善处理</button>'
            + '<button class="btn btn-sm btn-secondary" onclick="handleCrisis(' + i + ',1)">无视</button>'
            + '<button class="btn btn-sm btn-secondary" onclick="handleCrisis(' + i + ',2)" style="color:var(--color-danger);border-color:var(--color-danger);">处理不当</button>'
            + '</div></div>';
    }
    if (!eventsHtml) eventsHtml = '<div style="text-align:center;color:var(--color-text-light);padding:40px;">暂无活跃危机事件</div>';
    
    container.innerHTML = '<div class="page active">'
        + '<div class="page-header">'
        + '<div class="back-btn" onclick="goToPage(\'home\')">‹ 首页</div>'
        + '<div class="page-title">私生危机</div>'

        + '<div class="card" style="background:linear-gradient(135deg,var(--color-danger),#FF8FA3);color:white;">'

        + '</div>'

function handleCrisis(eventIdx, actionIdx) {
    var actions = [
        { name: '妥善处理', danger: -20, msg: '你处理得很好，危机已解除', creditBonus: 5 },
        { name: '无视', danger: 10, msg: '情况没有改善', creditBonus: 0 },
        { name: '处理不当', danger: 20, msg: '情况恶化了！', creditBonus: -10 }
    ];
    var a = actions[actionIdx];
    if (!a) return;
    gameState.danger = Math.max(0, gameState.danger + a.danger);
    if (a.creditBonus) gameState.credit = Math.max(0, Math.min(200, gameState.credit + a.creditBonus));
    
    if (eventIdx < crisisEvents.length) {
        crisisEvents[eventIdx].handled = true;
    }
    
    addNewCrisisEvent();
    
    showModal(a.name, a.msg + '\n危险值 ' + (a.danger > 0 ? '+' : '') + a.danger + (a.creditBonus ? '\n信誉 ' + (a.creditBonus > 0 ? '+' : '') + a.creditBonus : ''));
    render();
}

function startLive() {
    isLive = true;
    liveDanmakuTimer = setInterval(addDanmaku, 2000);
    _addTimer(liveDanmakuTimer);
    liveViewerTimer = setInterval(function() {
        if (isLive) {
            var vEl = document.getElementById('viewerCount');
            var lEl = document.getElementById('likeCount');
            var rEl = document.getElementById('liveRevenue');
            if (vEl) vEl.textContent = Math.floor(Math.random() * 500) + 100;
            if (lEl) lEl.textContent = Math.floor(Math.random() * 2000) + 500;
            if (rEl) rEl.textContent = Math.floor(Math.random() * 5000) + 1000;
        }
    }, 3000);
    _addTimer(liveViewerTimer);
    
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia && (gameState.liveMode || 'video') === 'video') {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 360 } } }).then(function(stream) {
            mediaStream = stream;
            var video = document.createElement('video');
            video.srcObject = stream;
            video.autoplay = true;
            video.playsInline = true;
            video.setAttribute('playsinline', '');
            video.muted = true;
            video.style.cssText = 'width:100%;height:200px;object-fit:cover;position:absolute;top:0;left:0;';
            var preview = document.getElementById('livePreview');
            if (preview) preview.insertBefore(video, preview.firstChild);
        }).catch(function(err) {
            console.log('Camera not available:', err);
        });
    }
    try { startLiveSpeech(); } catch(e) {}
    render();
}

function stopLive() {
    try {
        if (mediaStream) {
            var tracks = mediaStream.getTracks();
            for (var i = 0; i < tracks.length; i++) tracks[i].stop();
            mediaStream = null;
        }
    } catch(e) {}
    if (liveDanmakuTimer) { clearInterval(liveDanmakuTimer); liveDanmakuTimer = null; }
    if (liveViewerTimer) { clearInterval(liveViewerTimer); liveViewerTimer = null; }
    try { if (speechRecognition) { speechRecognition.stop(); speechRecognition = null; } } catch(e) {}
    isLive = false;
    
    var vEl2 = document.getElementById('viewerCount');
    var rEl2 = document.getElementById('liveRevenue');
    var viewers = vEl2 ? parseInt(vEl2.textContent) || 0 : 0;
    var revenue = rEl2 ? parseInt(rEl2.textContent) || 0 : 0;
    var fansGain = Math.floor(viewers / 50) + 5;
    gameState.fans += fansGain;
    gameState.money += revenue;
    gameState.fame = Math.min(200, (gameState.fame || 30) + Math.floor(Math.random() * 5) + 2);
    
    showModal('直播结束', '做得好！\n+' + fansGain + ' 粉丝\n+' + revenue.toLocaleString() + ' 金币\n+' + (Math.floor(Math.random()*5)+2) + ' 名气');
    render();
}

function startLiveSpeech() {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    if (speechRecognition) { try { speechRecognition.stop(); } catch(e) {} }
    speechRecognition = new SR();
    speechRecognition.continuous = true;
    speechRecognition.interimResults = true;
    speechRecognition.lang = 'ko-KR';
    speechRecognition.onresult = function(event) {
        try {
            var transcript = '';
            for (var i = event.resultIndex; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
            }
            var el = document.getElementById('liveSpeechText');
            if (el) { el.style.display = 'block'; el.textContent = transcript; }
            if (event.results[event.results.length - 1].isFinal) {
                var chatArea = document.getElementById('liveChatArea');
                if (chatArea) {
                    var chatDiv = document.createElement('div');
                    chatDiv.style.cssText = 'padding:4px 0;font-size:12px;text-align:right;';
                    chatDiv.innerHTML = '<span style="background:var(--color-secondary);color:var(--color-text);padding:4px 10px;border-radius:12px;">[语音] ' + transcript + '</span>';
                    chatArea.appendChild(chatDiv);
                    chatArea.scrollTop = chatArea.scrollHeight;
                }
            }
        } catch(e) {}
    };
    speechRecognition.onerror = function() {};
    try { speechRecognition.start(); } catch(e) {}
}

function toggleSpeechRecognition() {
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        showModal('不支持', '当前浏览器不支持语音识别');
        return;
    }
    
    if (speechRecognition) {
        speechRecognition.stop();
        speechRecognition = null;
        var btn = document.getElementById('speechBtn');
        if (btn) btn.textContent = '语音转文字';
        return;
    }
    
    speechRecognition = new SpeechRecognition();
    speechRecognition.continuous = true;
    speechRecognition.interimResults = true;
    speechRecognition.lang = 'ko-KR';
    
    speechRecognition.onresult = function(event) {
        var transcript = '';
        for (var i = event.resultIndex; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
        }
        var el = document.getElementById('liveSpeechText');
        if (el) { el.style.display = 'block'; el.textContent = transcript; }
    };
    
    speechRecognition.onerror = function() {
        var el = document.getElementById('liveSpeechText');
        if (el) { el.textContent = '语音识别出错，请重试'; }
    };
    
    try { speechRecognition.start(); } catch(e) {}
    var btn = document.getElementById('speechBtn');
    if (btn) btn.textContent = '关闭语音';
    showModal('语音已开启', '语音转文字功能已启动');
}

function choose会议Option(optionIndex) {
    var ds = gameState.meetingDialogState;
    if (!ds) return;
    
    var opt = ds.options[optionIndex];
    if (opt.effect) {
        if (opt.effect.credit) gameState.credit = Math.max(0, Math.min(200, gameState.credit + opt.effect.credit));
        if (opt.effect.fans) gameState.fans += opt.effect.fans;
        if (opt.effect['体力']) gameState.体力 = Math.max(0, gameState.体力 + opt.effect['体力']);
        if (opt.effect.influence) gameState.influence = Math.min(200, (gameState.influence || 50) + opt.effect.influence);
        if (opt.effect.fame) gameState.fame = Math.min(200, (gameState.fame || 30) + opt.effect.fame);
        if (opt.effect.danger) gameState.danger = Math.max(0, gameState.danger + opt.effect.danger);
    }
    
    if (ds.round >= ds.totalRounds) {
        var summary = '会议圆满结束！\n';
        if (opt.effect) {
            if (opt.effect.credit) summary += '信誉 +' + opt.effect.credit + '\n';
            if (opt.effect.fans) summary += '粉丝 +' + opt.effect.fans + '\n';
            if (opt.effect.influence) summary += '影响力 +' + opt.effect.influence + '\n';
            if (opt.effect.fame) summary += '名气 +' + opt.effect.fame + '\n';
            if (opt.effect['体力']) summary += '体力 ' + opt.effect['体力'] + '\n';
            if (opt.effect.danger) summary += '危险值 ' + (opt.effect.danger > 0 ? '+' : '') + opt.effect.danger;
        }
        gameState.meetingDialogState = null;
        showModal('会议结束', summary.trim());
        goToPage('meeting');
        return;
    }
    
    var nextDialog = ds.allDialogs[ds.round];
    ds.round++;
    ds.speaker = nextDialog.speaker;
    ds.dialog = nextDialog.dialog;
    ds.options = nextDialog.options;
    render();
}

        <div class="page active">
            <div class="page-header">
                <div class="back-btn" onclick="goToPage('home')">‹ 首页</div>
                <div class="page-title">设置</div>
                <div style="width: 32px;"></div>
            </div>
            <div class="page-content">
                <div class="card" onclick="saveGame(current存档)" style="cursor: pointer;">
                    <div style="font-weight: 600;">保存游戏</div>
                    <div style="font-size: 12px; color: var(--color-text-light);">保存到存档 ${current存档 + 1}</div>
                </div>
                

                <div class="card" onclick="confirmExit()">
                    <div style="font-weight: 600; color: var(--color-danger);">退出游戏</div>
                    <div style="font-size: 12px; color: var(--color-text-light);">返回标题画面</div>
                </div>
            </div>
        </div>
    `;
}

function confirmExit() {
    showModal('退出游戏', '确定要退出吗？请先保存游戏', [
        { text: '取消', action: closeModal },
        { text: '退出', action: () => {
            currentPage = 'welcome';
            document.getElementById('statusBar').style.display = 'none';
            document.getElementById('restButtons').style.display = 'none';
            document.getElementById('bottomNav').style.display = 'none';
            document.getElementById('homeIndicator').style.display = 'none';
            render();
        }}
    ]);
}

// ==================== GAME ACTIONS ====================
function do训练() {
    if (gameState.体力 < 20) {
        showModal('体力不足', '请先休息恢复体力');
        return;
    }
    
    gameState.体力 -= 20;
    gameState.money -= 1000;
    
    const keys = Object.keys(gameState.stats);
    const randomKey = keys[Math.floor(Math.random() * keys.length)];
    gameState.stats[randomKey] = Math.min(100, gameState.stats[randomKey] + 1);
    
    const names = { dance: '舞蹈', vocal: '声乐', rap: '说唱', acting: '表演', variety: '综艺' };
    showModal('训练完成', `-20 体力\n-1,000 金币\n+1 ${names[randomKey]}`);
    render();
}

function showMail() {
    currentPage = 'mail';
    render();
    renderBottomNav();
}

// ==================== REST FUNCTIONS ====================
function rest30sec() {
    if (gameState.restTimeout) {
        clearTimeout(gameState.restTimeout);
    }
    
    var recovered = 0;
    var interval = setInterval(function() {
        if (gameState['体力'] >= gameState['max体力'] || recovered >= 60) {
            clearInterval(interval);
            return;
        }
        gameState['体力'] = Math.min(gameState['max体力'], gameState['体力'] + 2);
        recovered += 2;
        update体力Display();
    }, 100);
    _addTimer(interval);
    
    showModal('休息中', '正在恢复体力，请等待30秒...');
    var timeout = setTimeout(function() {
        clearInterval(interval);
        showModal('休息完成', '+60 体力已恢复！');
        render();
    }, 30000);
    _addTimer(timeout);
}

function rest50percent() {
    const restore = Math.floor(gameState.max体力 * 0.5);
    gameState.体力 = Math.min(gameState.max体力, gameState.体力 + restore);
    showModal('休息完成', `+${restore} 体力已恢复！`);
    render();
}

function update体力Display() {
    const 体力Bar = document.querySelector('.stat-fill.体力');
    const 体力Value = document.querySelector('.stat-value');
    if (体力Bar) {
        体力Bar.style.width = (gameState.体力 / gameState.max体力 * 100) + '%';
    }
    if (体力Value) {
        体力Value.textContent = gameState.体力;
    }
}

// ==================== MODAL ====================
function showModal(title, message, buttons) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalMessage').innerHTML = message;
    
    const btnContainer = document.getElementById('modalButtons');
    if (!buttons) {
        buttons = [{ text: '确定', action: closeModal }];
    }
    
    btnContainer.innerHTML = buttons.map(b => 
        `<button class="btn ${b.text === '取消' ? 'btn-secondary' : 'btn-primary'}" onclick="(${b.action.toString()})()" style="margin: 0 4px;">${b.text}</button>`
    ).join('');
    
    document.getElementById('modal').classList.add('active');
}

function closeModal() {
    document.getElementById('modal').classList.remove('active');
}

// ==================== SAVE/LOAD ====================
let current存档 = 0;

function saveGame(slot) {
    var saveData = {
        player: gameState.player,
        '体力': gameState['体力'],
        'max体力': gameState['max体力'],
        life: gameState.life,
        credit: gameState.credit,
        danger: gameState.danger,
        money: gameState.money,
        fans: gameState.fans,
        teamMembers: gameState.teamMembers,
        relationships: gameState.relationships,
        emails: gameState.emails,
        'bubble已发送': gameState['bubble已发送'],
        dating: gameState.dating,
        inventory: gameState.inventory,
        stats: gameState.stats,
        scheduleItems: gameState.scheduleItems,
        meetings: gameState.meetings,
        loanAmount: gameState.loanAmount,
        loanInterest: gameState.loanInterest,
        'npc好感度': gameState['npc好感度'],
        influence: gameState.influence,
        fame: gameState.fame,
        totalLikes: gameState.totalLikes,
        insPosts: gameState.insPosts,
        tiktokPosts: gameState.tiktokPosts,
        insMessages: gameState.insMessages,
        tiktokMessages: gameState.tiktokMessages
    };
    
    try {
        localStorage.setItem('myidol_save_' + slot, JSON.stringify(saveData));
        showModal('保存成功', '游戏已保存到存档 ' + (slot + 1));
    } catch (e) {
        showModal('保存失败', '无法保存游戏。');
    }
}

function loadGame(slot) {
    try {
        const data = localStorage.getItem('myidol_save_' + slot);
        if (data) {
            const saveData = JSON.parse(data);
            Object.assign(gameState, saveData);
            current存档 = slot;
            
            currentPage = 'home';
            render();
            
            document.getElementById('statusBar').style.display = 'flex';
            document.getElementById('restButtons').style.display = 'flex';
            document.getElementById('bottomNav').style.display = 'flex';
            document.getElementById('homeIndicator').style.display = 'block';
            
            renderBottomNav();
        }
    } catch (e) {
        showModal('加载失败', '无法加载游戏。');
    }
}

function loadAllSaves() {
    const saves = [null, null, null];
    for (let i = 0; i < 3; i++) {
        try {
            const data = localStorage.getItem('myidol_save_' + i);
            if (data) {
                saves[i] = JSON.parse(data);
            }
        } catch (e) {}
    }
    return saves;
}

// ==================== TIME ====================
function updateTime() {
    const now = new Date();
    const hours = now.getHours().toString().padStart(2, '0');
    const minutes = now.getMinutes().toString().padStart(2, '0');
    const timeEl = document.getElementById('statusTime');
    if (timeEl) {
        timeEl.textContent = hours + ':' + minutes;
    }
}

setInterval(updateTime, 1000);
updateTime();

// ==================== INIT ====================
// ==================== GLOBAL ERROR HANDLER ====================
window.onerror = function(msg, url, line) {
    console.error('Global error:', msg, line);
    try {
        var app = document.getElementById('app');
        if (app) app.innerHTML = '<div style="padding:40px;text-align:center;"><div style="font-size:18px;color:#FF6B8A;margin-bottom:12px;">出了点问题</div><div style="font-size:12px;color:#8E8E93;margin-bottom:16px;">' + (msg || '') + '</div><button onclick="goToPage(\'home\')" style="padding:12px 24px;background:#FF8FA3;color:white;border:none;border-radius:50px;font-size:14px;cursor:pointer;">返回首页</button></div>';
    } catch(e2) {}
    return true;
};

// ==================== TIMER CLEANUP ====================
var _pageTimers = [];
function _addTimer(id) { _pageTimers.push(id); }
function _clearPageTimers() {
    for (var i = 0; i < _pageTimers.length; i++) {
        try { clearInterval(_pageTimers[i]); } catch(e) {}
        try { clearTimeout(_pageTimers[i]); } catch(e) {}
    }
    _pageTimers = [];
    if (liveDanmakuTimer) { clearInterval(liveDanmakuTimer); liveDanmakuTimer = null; }
    if (liveViewerTimer) { clearInterval(liveViewerTimer); liveViewerTimer = null; }
    if (speechRecognition) { try { speechRecognition.stop(); } catch(e) {} speechRecognition = null; }
    if (isLive) stopLive();
}

// Override goToPage to clear timers
var _origGoToPage = goToPage;
goToPage = function(page) {
    _clearPageTimers();
    try { _origGoToPage(page); } catch(e) {
        console.error('goToPage error:', e);
        currentPage = 'home';
        try { render(); renderBottomNav(); } catch(e2) {}
    }
};

render();
</script>
