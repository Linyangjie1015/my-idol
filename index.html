<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>My Idol - 维护中</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="My Idol">
    <meta name="theme-color" content="#FF8FA3">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FFF5F7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #2D2D2D;
            padding: 24px;
        }
        .container {
            text-align: center;
            max-width: 360px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        .title {
            font-size: 22px;
            font-weight: 700;
            color: #FF8FA3;
            margin-bottom: 16px;
        }
        .message {
            font-size: 16px;
            color: #8E8E93;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .divider {
            width: 40px;
            height: 3px;
            background: #FFCCD8;
            border-radius: 2px;
            margin: 0 auto 24px;
        }
        .hint {
            font-size: 13px;
            color: #B0B0B0;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔧</div>
        <div class="title">V1.5 临时维护中</div>
        <div class="divider"></div>
        <div class="message">请稍后再试</div>
        <div class="hint">我们正在升级，敬请期待全新版本</div>
    </div>
</body>
</html>
