<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Idol - Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #FFF5F7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
#log { width: 100%; max-width: 400px; background: white; border-radius: 12px; padding: 16px; font-size: 12px; line-height: 1.5; color: #333; box-shadow: 0 2px 12px rgba(255,143,163,0.15); overflow: hidden; }
#log div { padding: 2px 0; border-bottom: 1px solid #f5f5f5; word-break: break-all; }
.ok { color: #4CD964; }
.err { color: #FF6B8A; font-weight: 600; }
.wait { color: #999; }
</style>
</head>
<body>
<div id="log"></div>
<script>
var L = document.getElementById('log');
var t0 = Date.now();
function log(msg, cls) {
    var d = document.createElement('div');
    d.className = cls || '';
    d.textContent = '[' + ((Date.now()-t0)/1000).toFixed(1) + 's] ' + msg;
    L.appendChild(d);
    L.scrollTop = L.scrollHeight;
}

// Catch ALL JS errors including syntax errors
window.onerror = function(msg, url, line, col, error) {
    log('JS ERROR: ' + msg, 'err');
    log('  at line ' + line + ' col ' + col, 'err');
    if (error && error.stack) {
        var stackLines = error.stack.split('\n').slice(0, 3);
        for (var i = 0; i < stackLines.length; i++) {
            log('  ' + stackLines[i], 'err');
        }
    }
    return true;
};

// Also catch unhandled promise rejections
window.addEventListener('unhandledrejection', function(e) {
    log('Promise error: ' + e.reason, 'err');
});

log('Test page loaded', 'ok');
log('UA: ' + navigator.userAgent.substring(0, 60), 'wait');

// Unregister any existing SW
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistration().then(function(r) {
        if (r) {
            log('Old SW found, unregistering...', 'wait');
            r.unregister().then(function() { log('Old SW removed', 'ok'); });
        } else {
            log('No SW found', 'ok');
        }
    });
}

// Try to load v1.6.js and capture errors
var bust = Date.now();
log('Loading v1.6.js...', 'wait');
var s = document.createElement('script');
s.src = 'v1.6.js?v=errtest&_bust=' + bust;
s.onload = function() {
    log('v1.6.js DOWNLOADED OK', 'ok');
    log('render: ' + typeof render, typeof render === 'function' ? 'ok' : 'err');
    log('gameState: ' + typeof gameState, typeof gameState !== 'undefined' ? 'ok' : 'err');
    if (typeof gameState === 'undefined' && typeof render === 'undefined') {
        log('Both undefined = JS had SYNTAX ERROR', 'err');
        log('Checking via fetch+eval...', 'wait');
        // Try fetching the raw file and eval it to get the exact error
        fetch('v1.6.js?v=errtest2&_bust=' + Date.now()).then(function(r) {
            return r.text();
        }).then(function(code) {
            log('Fetched ' + code.length + ' bytes', 'wait');
            try {
                (0, eval)(code);
                log('eval succeeded!', 'ok');
                log('After eval: render=' + typeof render + ' gameState=' + typeof gameState, typeof render === 'function' ? 'ok' : 'err');
            } catch(e) {
                log('EVAL ERROR: ' + e.message, 'err');
                log('  stack: ' + (e.stack || '').split('\n').slice(0,5).join(' | '), 'err');
                // Try to find the error location
                var m = e.message.match(/line (\d+)/);
                if (m) {
                    var errLine = parseInt(m[1]);
                    log('Error at line ' + errLine, 'err');
                }
            }
        }).catch(function(e) {
            log('Fetch failed: ' + e.message, 'err');
        });
    } else if (typeof render === 'function') {
        log('render() works! Calling it...', 'ok');
        try { render(); log('render() OK!', 'ok'); } catch(e) { log('render error: ' + e.message, 'err'); }
    }
};
s.onerror = function() {
    log('v1.6.js DOWNLOAD FAILED', 'err');
};
document.head.appendChild(s);

// Load npc-data.js
var s2 = document.createElement('script');
s2.src = 'npc-data.js?v=errtest&_bust=' + bust;
s2.onload = function() { log('npc-data.js OK, COMPANIES=' + (Object.keys(COMPANIES||{}).length), 'ok'); };
s2.onerror = function() { log('npc-data.js FAILED', 'err'); };
document.head.appendChild(s2);
</script>
</body>
</html>
